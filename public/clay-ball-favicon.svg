<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- squircle "clay chip" cream fill, verbatim from .clay-mark-chip:
         linear-gradient(150deg, ck-clay-a #f8f2e7, ck-clay-b #e7dbc6) -->
    <linearGradient id="chip" x1="0.32" y1="0" x2="0.68" y2="1">
      <stop offset="0" stop-color="#f8f2e7"/>
      <stop offset="1" stop-color="#e7dbc6"/>
    </linearGradient>

    <!-- subtle top-left clay highlight / bottom-right shading inside the squircle -->
    <radialGradient id="chipShade" cx="0.32" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#7a5a3a" stop-opacity="0.10"/>
    </radialGradient>

    <!-- petal fill, verbatim from .feel-petal:
         radial-gradient(circle at 38% 26%, #e3b45f, color-terracotta #c6613f 75%) -->
    <radialGradient id="petal" cx="0.38" cy="0.26" r="0.78">
      <stop offset="0" stop-color="#eec27a"/>
      <stop offset="0.42" stop-color="#e3b45f"/>
      <stop offset="1" stop-color="#c6613f"/>
    </radialGradient>

    <!-- core (glossy sphere), verbatim from ClayBloom's frozen feel-core:
         radial-gradient(circle at 34% 28%, rgb(243,208,166) #f3d0a6,
           rgb(198,97,63) #c6613f 62%, rgb(164,84,56) #a45438) -->
    <radialGradient id="core" cx="0.32" cy="0.26" r="0.85">
      <stop offset="0" stop-color="#f8dfbb"/>
      <stop offset="0.3" stop-color="#f3d0a6"/>
      <stop offset="0.62" stop-color="#c6613f"/>
      <stop offset="1" stop-color="#a45438"/>
    </radialGradient>

    <radialGradient id="coreGlint" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle: border-radius 38% verbatim from .clay-mark-chip -->
  <rect x="24" y="24" width="464" height="464" rx="176" ry="176" fill="url(#chip)"/>
  <rect x="24" y="24" width="464" height="464" rx="176" ry="176" fill="url(#chipShade)"/>

  <!-- flower: 5 petals at 0/72/144/216/288deg, offset -116 from center,
       geometry ported from .feel-petal (64x78 blob) + WeekFeel's PETALS ring,
       enlarged/lengthened so the lobes read clearly at favicon size -->
  <g transform="translate(256,256)">
    <g fill="url(#petal)">
      <path transform="rotate(0) translate(0,-110)"   d="M0,-52 C22,-52 38,-34 37,-4 C36,22 20,36 0,36 C-20,36 -36,22 -37,-4 C-38,-34 -22,-52 0,-52 Z"/>
      <path transform="rotate(72) translate(0,-110)"  d="M0,-52 C22,-52 38,-34 37,-4 C36,22 20,36 0,36 C-20,36 -36,22 -37,-4 C-38,-34 -22,-52 0,-52 Z"/>
      <path transform="rotate(144) translate(0,-110)" d="M0,-52 C22,-52 38,-34 37,-4 C36,22 20,36 0,36 C-20,36 -36,22 -37,-4 C-38,-34 -22,-52 0,-52 Z"/>
      <path transform="rotate(216) translate(0,-110)" d="M0,-52 C22,-52 38,-34 37,-4 C36,22 20,36 0,36 C-20,36 -36,22 -37,-4 C-38,-34 -22,-52 0,-52 Z"/>
      <path transform="rotate(288) translate(0,-110)" d="M0,-52 C22,-52 38,-34 37,-4 C36,22 20,36 0,36 C-20,36 -36,22 -37,-4 C-38,-34 -22,-52 0,-52 Z"/>
    </g>

    <!-- core sphere painted on top, same stacking order as ClayBloom (feel-core after feel-petal-ring) -->
    <circle r="88" fill="url(#core)"/>
    <ellipse cx="-24" cy="-28" rx="21" ry="13" fill="url(#coreGlint)" transform="rotate(-18 -24 -28)"/>
  </g>
</svg>
